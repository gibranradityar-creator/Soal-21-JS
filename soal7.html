<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 7</title>
</head>
<body>
    <script src="7.js">
            let a = 8.3;
            let c = "3.2";

            let tambah = a + parseFloat(c);
            let kurang = a - parseFloat(c);
            let kali = a * parseFloat(c);
            let bagi = a / parseFloat(c);
            let persen = a % 3;

            console.log(
                `    8.3 + 3.2 = ${tambah.toFixed(0)}
                8.3 - 3.2 = ${kurang.toFixed(0)}
                8.3 x 3.2 = ${kali.toFixed(0)}
                8.3 / 3.2 = ${bagi.toFixed(0)}
                8 % 3 = ${persen.toFixed(0)}`
            )

            document.write(
            `8.3 + 3.2 = ${tambah.toFixed(0)} <br>
           8.3 - 3.2 = ${kurang.toFixed(0)} <br>
           8.3 x 3.2 = ${kali.toFixed(0)} <br>
           8.3 / 3.2 = ${bagi.toFixed(0)} <br>
           8 % 3 = ${persen.toFixed(0)}`
        )
    </script>
</body>
</html>
